<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>CodeQuest — Teacher Dashboard</title>
    <link rel="stylesheet" href="teacher/teacher.css">
</head>
<body>

<!-- ── LOGIN ── -->
<div id="login-screen">
    <div id="login-box">
        <h1>TEACHER DASHBOARD</h1>
        <p>CodeQuest RPG · Class Monitor</p>
        <input type="password" id="teacher-pass" placeholder="Enter teacher password" />
        <button onclick="checkLogin()">▶ ENTER DASHBOARD</button>
        <p id="login-error"></p>
    </div>
</div>

<!-- ── DASHBOARD ── -->
<div id="dashboard">
    <div id="dash-header">
        <div>
            <h1>📊 STUDENT PROGRESS</h1>
            <p>CodeQuest RPG — Live Class Monitor</p>
        </div>
        <button id="btn-refresh" onclick="loadDashboard()">↻ REFRESH</button>
    </div>

    <div id="stats-row">
        <div class="stat-card">
            <div class="stat-label">Total Students</div>
            <div class="stat-value" id="stat-total">—</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">On Mountain</div>
            <div class="stat-value" id="stat-island2">—</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Boss Defeated</div>
            <div class="stat-value" id="stat-boss">—</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Avg XP</div>
            <div class="stat-value" id="stat-xp">—</div>
        </div>
    </div>

    <div id="table-wrap">
        <div id="table-header">
            <h2>// ALL STUDENTS</h2>
            <input id="search" placeholder="Search username..." oninput="filterTable()" />
        </div>
        <div id="loading">Loading student data...</div>
        <table id="student-table" style="display:none">
            <thead>
                <tr>
                    <th>Username</th>
                    <th>Level / XP</th>
                    <th>Skills</th>
                    <th>Milestones</th>
                    <th>Last Seen</th>
                </tr>
            </thead>
            <tbody id="table-body"></tbody>
        </table>
        <div id="no-students" style="display:none">No students yet — share the game link!</div>
    </div>
</div>

<script type="module" src="teacher/teacher.js"></script>
</body>
</html>
