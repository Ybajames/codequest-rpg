<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CodeQuest 3D — Learn Python on the Island</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<!-- ── USERNAME SCREEN ──────────────────────────────────────────────── -->
<div id="usernameScreen">
  <div class="username-card">
    <div class="logo-art">
      <span class="logo-cq">CQ</span>
      <div class="logo-pulse"></div>
    </div>
    <h1>CodeQuest 3D</h1>
    <p class="tagline">Learn Python • Explore the Island • Battle Friends</p>
    <input id="usernameInput" type="text" placeholder="Enter your username…" maxlength="16" autocomplete="off" />
    <button id="usernameBtn">Enter World →</button>
    <div id="usernameError"></div>
  </div>
</div>

<!-- ── CANVAS ────────────────────────────────────────────────────────── -->
<canvas id="gameCanvas"></canvas>

<!-- ── HUD ──────────────────────────────────────────────────────────── -->
<div id="crosshair">+</div>

<div id="ui">
  <div id="xpBar">
    <div id="xpFill"></div>
    <span id="xpLabel">LVL 1 — 0 XP</span>
  </div>
</div>

<!-- ── LESSON TOOLTIP ────────────────────────────────────────────────── -->
<div id="lessonHUD"><span id="lessonText">Explore the island!</span></div>

<!-- ── INVENTORY PANEL ───────────────────────────────────────────────── -->
<button id="quest-btn" title="Quests & Inventory">📜</button>
<div id="quests">
  <h3>🎒 Abilities</h3>
  <ul id="inventoryList"></ul>
  <h3 style="margin-top:12px">📋 Quests</h3>
  <ul id="questList"></ul>
</div>

<!-- ── VR BUTTON CONTAINER ───────────────────────────────────────────── -->
<div id="vr-btn-container"></div>

<!-- ── SAVE INDICATOR ───────────────────────────────────────────────── -->
<div id="save-indicator">● SAVED</div>

<!-- ── MODULES ───────────────────────────────────────────────────────── -->
<script type="module" src="js/main.js"></script>
</body>
</html>
